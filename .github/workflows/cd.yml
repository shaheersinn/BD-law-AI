name: CD

on:
  push:
    branches: [main]

# Prevent concurrent deploys to the same environment
concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  # ── CI gate ────────────────────────────────────────────────────────────────
  # Re-run the same checks as ci.yml before touching production.
  lint-test:
    name: Lint + Test (pre-deploy gate)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('backend/requirements*.txt') }}
          restore-keys: pip-

      - name: Install lint + test dependencies
        run: |
          pip install --upgrade pip
          pip install \
            ruff==0.9.3 \
            mypy==1.14.1 \
            bandit==1.8.3 \
            pytest==8.3.4 \
            pytest-asyncio==0.25.2 \
            pytest-mock==3.14.0 \
            httpx==0.28.1 \
            fastapi==0.115.6 \
            pydantic==2.10.5 \
            pydantic-settings==2.7.0 \
            sqlalchemy==2.0.36 \
            structlog==25.1.0 \
            python-jose==3.3.0 \
            passlib==1.7.4 \
            bcrypt==4.2.1 \
            redis==5.2.1 \
            celery==5.4.0 \
            sentry-sdk==2.20.0 \
            prometheus-client==0.21.1 \
            scipy==1.14.1 \
            rapidfuzz==3.11.0 \
            psycopg2-binary==2.9.10

      - name: Ruff — lint
        working-directory: backend
        run: ruff check app/ tests/

      - name: Ruff — format check
        working-directory: backend
        run: ruff format --check app/

      - name: Bandit — security scan
        working-directory: backend
        run: bandit -r app/ -ll -q

      - name: Pytest — unit tests
        working-directory: backend
        run: |
          pytest tests/ -x -q --tb=short \
            --ignore=tests/load \
            --ignore=tests/integration

  # ── Deploy to DigitalOcean App Platform ────────────────────────────────────
  deploy:
    name: Deploy to DO App Platform
    runs-on: ubuntu-latest
    needs: lint-test

    steps:
      - uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Log in to DigitalOcean Container Registry
        run: doctl registry login --expiry-seconds 1200

      - name: Build and push backend image
        run: |
          cd backend
          docker build -t registry.digitalocean.com/oracle-containers/oracle-backend:latest \
                       -t registry.digitalocean.com/oracle-containers/oracle-backend:${{ github.sha }} .
          docker push registry.digitalocean.com/oracle-containers/oracle-backend:latest
          docker push registry.digitalocean.com/oracle-containers/oracle-backend:${{ github.sha }}

      - name: Update DO App Spec and Deploy
        # Applies the updated do-app.yaml and triggers a new deployment
        # NEVER runs alembic upgrade head — migrations are manual via scripts/run_migrations.sh
        run: |
          doctl apps update ${{ secrets.DO_APP_ID }} --spec do-app.yaml --wait

      - name: Verify deployment succeeded
        run: |
          PHASE=$(doctl apps list-deployments ${{ secrets.DO_APP_ID }} \
            --format Phase --no-header | head -1)
          echo "Deployment phase: $PHASE"
          if [ "$PHASE" != "ACTIVE" ]; then
            echo "ERROR: Deployment phase is '$PHASE', expected ACTIVE"
            exit 1
          fi

      - name: Smoke test — health endpoint
        run: |
          echo "Checking ${{ secrets.DO_API_URL }}/api/health ..."
          curl -sf "${{ secrets.DO_API_URL }}/api/health" | jq .
          echo "Health check passed."

      - name: Smoke test — top-velocity (authenticated)
        run: |
          echo "Checking /api/v1/scores/top-velocity ..."
          curl -sf \
            -H "Authorization: Bearer ${{ secrets.SMOKE_TEST_TOKEN }}" \
            "${{ secrets.DO_API_URL }}/api/v1/scores/top-velocity?limit=5"
          echo "Top-velocity check passed."

  # ── Notify on failure ──────────────────────────────────────────────────────
  notify-failure:
    name: Notify deploy failure
    runs-on: ubuntu-latest
    needs: deploy
    if: failure()

    steps:
      - name: Post Slack alert
        run: |
          curl -sf -X POST \
            -H "Content-Type: application/json" \
            -d "{\"text\": \"🚨 ORACLE deploy FAILED on main\\nCommit: \`${{ github.sha }}\`\\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
            "${{ secrets.SLACK_WEBHOOK_URL }}"
