[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
testpaths = ["tests"]
python_files = ["test_*.py"]
python_functions = ["test_*"]
addopts = "-v --tb=short"

[tool.coverage.run]
source = ["app"]
omit = ["app/tasks/_impl.py", "scripts/*"]

[tool.coverage.report]
show_missing = true
fail_under = 70

[tool.bandit]
# B608: SQL f-strings in training/dataset_builder.py use only internal feature
# column names (from a hardcoded list, not user input). Not an injection vector.
skips = ["B608", "B101", "B105", "B106"]
exclude_dirs = ["app/training/dataset_builder.py"]
