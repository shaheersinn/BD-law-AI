target-version = "py312"
line-length = 100

[lint]
select = [
    "E", "F", "W",  # pycodestyle + pyflakes
    "I",             # isort
    "B",             # flake8-bugbear
    "C4",            # flake8-comprehensions
    "UP",            # pyupgrade
    "S",             # flake8-bandit (security)
    "N",             # pep8-naming
]
ignore = [
    "S101",  # assert — used in tests
    "S105",  # hardcoded-password-string — false positives in config defaults
    "B008",  # do-not-perform-function-call-in-default-argument — needed for Depends()
    "N806",  # variable in function should be lowercase — conflicts with SQLAlchemy patterns
    "N803",  # argument name should be lowercase — ML convention for matrices (X_train, X_holdout)
    "N812",  # imported as non-lowercase — torch.nn.functional as F is universal ML convention
    "B905",  # zip() without strict= — internal calls with matching-length arrays
]

[lint.per-file-ignores]
"tests/**/*.py" = ["S101", "S106", "S108", "E501"]
"scripts/**/*.py" = ["S101"]
"alembic/**/*.py" = ["E402"]
# Scrapers parse external RSS/XML (S314) and use safe pseudo-random for jitter (S311)
# Long lines in scrapers are often unavoidable (User-Agent strings, URLs, patterns)
"app/scrapers/**/*.py" = ["S314", "S311", "S110", "E501"]
# Services may have long AI prompts and strings
"app/services/**/*.py" = ["E501"]
# Routes and tasks can have long descriptive strings
"app/routes/**/*.py" = ["E501"]
"app/tasks/**/*.py" = ["E501", "S608"]
# Feature files have long compute() signatures and descriptive docstrings
"app/features/**/*.py" = ["E501"]
# ML training uses internal feature_columns list (not user input) in SQL — not an injection vector
"app/training/dataset_builder.py" = ["S608", "B023"]
# Training script uses /tmp as default output dir — safe in Azure batch context
"app/training/train_all.py" = ["S108"]
# ML models use uppercase matrix names (X) by convention; S110 is acceptable in batch score_batch
"app/ml/**/*.py" = ["S110", "B023"]

[format]
quote-style = "double"
indent-style = "space"
