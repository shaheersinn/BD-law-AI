target-version = "py312"
line-length = 100

[lint]
select = [
    "E", "F", "W",  # pycodestyle + pyflakes
    "I",             # isort
    "B",             # flake8-bugbear
    "C4",            # flake8-comprehensions
    "UP",            # pyupgrade
    "S",             # flake8-bandit (security)
    "N",             # pep8-naming
]
ignore = [
    "S101",  # assert — used in tests
    "S105",  # hardcoded-password-string — false positives in config defaults
    "B008",  # do-not-perform-function-call-in-default-argument — needed for Depends()
    "N806",  # variable in function should be lowercase — conflicts with SQLAlchemy patterns
]

[lint.per-file-ignores]
"tests/**/*.py" = ["S101", "S106"]
"scripts/**/*.py" = ["S101"]
"alembic/**/*.py" = ["E402"]

[format]
quote-style = "double"
indent-style = "space"
