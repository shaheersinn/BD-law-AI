name: oracle-bd-for-law
region: nyc3

services:
  - name: api
    github:
      repo: shaheersinn/BD-law-AI
      branch: main
      deploy_on_push: true
    dockerfile_path: backend/Dockerfile
    source_dir: backend
    instance_size_slug: basic-s
    instance_count: 1
    http_port: 8000
    routes:
      - path: /api
    health_check:
      http_path: /api/health
      initial_delay_seconds: 60
      period_seconds: 30
      timeout_seconds: 10
      failure_threshold: 3
      success_threshold: 1
    envs:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: LOG_LEVEL
        value: INFO
      - key: LIVE_FEEDS_ENABLED
        value: "true"
      - key: ALLOWED_ORIGINS
        value: '["https://oracle-bd-for-law.ondigitalocean.app"]'
      - key: SECRET_KEY
        scope: RUN_TIME
        type: SECRET
        value: "SET_IN_DO_DASHBOARD"
      - key: ADMIN_EMAIL
        scope: RUN_TIME
        type: SECRET
        value: "SET_IN_DO_DASHBOARD"
        # ACTION REQUIRED: Set this in DigitalOcean App Platform dashboard → Settings → Environment Variables
      - key: ADMIN_PASSWORD
        scope: RUN_TIME
        type: SECRET
        value: "SET_IN_DO_DASHBOARD"
        # ACTION REQUIRED: Set this in DigitalOcean App Platform dashboard → Settings → Environment Variables
      - key: DATABASE_URL
        scope: RUN_TIME
        type: SECRET
        value: "SET_IN_DO_DASHBOARD"
      - key: MONGODB_URL
        scope: RUN_TIME
        type: SECRET
        value: "SET_IN_DO_DASHBOARD"
      - key: REDIS_URL
        scope: RUN_TIME
        type: SECRET
        value: "SET_IN_DO_DASHBOARD"
      - key: REDIS_RESULT_BACKEND
        scope: RUN_TIME
        type: SECRET
        value: "SET_IN_DO_DASHBOARD"
      - key: CELERY_BROKER_URL
        scope: RUN_TIME
        type: SECRET
        value: "SET_IN_DO_DASHBOARD"
      - key: CELERY_RESULT_BACKEND
        scope: RUN_TIME
        type: SECRET
        value: "SET_IN_DO_DASHBOARD"

workers:
  - name: worker
    github:
      repo: shaheersinn/BD-law-AI
      branch: main
      deploy_on_push: true
    dockerfile_path: backend/Dockerfile
    source_dir: backend
    instance_size_slug: professional-xs
    instance_count: 1
    run_command: >
      celery -A app.tasks.celery_app:celery_app worker
      --loglevel=info
      --concurrency=4
      --queues=scrapers,features,scoring,agents,default
      --max-tasks-per-child=1000
    envs:
      - key: ENVIRONMENT
        value: production
      - key: LIVE_FEEDS_ENABLED
        value: "true"
      - key: SECRET_KEY
        scope: RUN_TIME
        type: SECRET
        value: "SET_IN_DO_DASHBOARD"
      - key: DATABASE_URL
        scope: RUN_TIME
        type: SECRET
        value: "SET_IN_DO_DASHBOARD"
      - key: MONGODB_URL
        scope: RUN_TIME
        type: SECRET
        value: "SET_IN_DO_DASHBOARD"
      - key: REDIS_URL
        scope: RUN_TIME
        type: SECRET
        value: "SET_IN_DO_DASHBOARD"
      - key: REDIS_RESULT_BACKEND
        scope: RUN_TIME
        type: SECRET
        value: "SET_IN_DO_DASHBOARD"
      - key: CELERY_BROKER_URL
        scope: RUN_TIME
        type: SECRET
        value: "SET_IN_DO_DASHBOARD"
      - key: CELERY_RESULT_BACKEND
        scope: RUN_TIME
        type: SECRET
        value: "SET_IN_DO_DASHBOARD"

  - name: beat
    github:
      repo: shaheersinn/BD-law-AI
      branch: main
      deploy_on_push: true
    dockerfile_path: backend/Dockerfile
    source_dir: backend
    instance_size_slug: basic-xs
    instance_count: 1
    run_command: >
      celery -A app.tasks.celery_app:celery_app beat
      --loglevel=info
      --scheduler redbeat.RedBeatScheduler
    envs:
      - key: ENVIRONMENT
        value: production
      - key: SECRET_KEY
        scope: RUN_TIME
        type: SECRET
        value: "SET_IN_DO_DASHBOARD"
      - key: DATABASE_URL
        scope: RUN_TIME
        type: SECRET
        value: "SET_IN_DO_DASHBOARD"
      - key: MONGODB_URL
        scope: RUN_TIME
        type: SECRET
        value: "SET_IN_DO_DASHBOARD"
      - key: REDIS_URL
        scope: RUN_TIME
        type: SECRET
        value: "SET_IN_DO_DASHBOARD"
      - key: REDIS_RESULT_BACKEND
        scope: RUN_TIME
        type: SECRET
        value: "SET_IN_DO_DASHBOARD"
      - key: CELERY_BROKER_URL
        scope: RUN_TIME
        type: SECRET
        value: "SET_IN_DO_DASHBOARD"
      - key: CELERY_RESULT_BACKEND
        scope: RUN_TIME
        type: SECRET
        value: "SET_IN_DO_DASHBOARD"

static_sites:
  - name: frontend
    github:
      repo: shaheersinn/BD-law-AI
      branch: main
      deploy_on_push: true
    source_dir: frontend
    build_command: npm install && npm run build
    output_dir: dist
    index_document: index.html
    error_document: index.html
    envs:
      - key: VITE_API_URL
        value: ${api.PUBLIC_URL}
