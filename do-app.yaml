# ORACLE — DigitalOcean App Platform deployment spec
# Region: tor1 (Toronto — Canadian data residency)
#
# SETUP REQUIRED BEFORE FIRST DEPLOY:
# 1. Ensure shaheersinn is your GitHub username
# 2. Set encrypted env vars in the DO console:
#    SECRET_KEY, DATABASE_URL, REDIS_URL, REDIS_RESULT_BACKEND,
#    MONGODB_URL, CELERY_BROKER_URL, CELERY_RESULT_BACKEND,
#    SPACES_KEY, SPACES_SECRET, SENTRY_DSN, SLACK_WEBHOOK_URL
# 3. Run migrations MANUALLY before first deploy:
#    cd backend && DATABASE_URL=<your-do-db-url> alembic upgrade head
# 4. Set ALLOWED_ORIGINS to include both your DO app URL and Vercel frontend URL
#
# NEVER run alembic upgrade head in run_command — migrations are always manual.

name: oracle-bd-for-law
region: tor1

services:
  # ── FastAPI Backend ──────────────────────────────────────────────────────
  - name: api
    source_dir: backend
    github:
      repo: shaheersinn/BD-law-AI
      branch: main
      deploy_on_push: true
    dockerfile_path: Dockerfile
    instance_size_slug: basic-s
    instance_count: 1
    min_instance_count: 1
    http_port: 8000
    # CMD in Dockerfile handles startup — no run_command needed
    health_check:
      http_path: /api/health
      initial_delay_seconds: 60
      period_seconds: 30
      timeout_seconds: 10
      failure_threshold: 3
      success_threshold: 1
    envs:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: LOG_LEVEL
        value: INFO
      - key: LIVE_FEEDS_ENABLED
        value: "true"
      # CORS — set to your actual frontend URLs (DO app + Vercel)
      - key: ALLOWED_ORIGINS
        value: '["https://oracle-bd-for-law.ondigitalocean.app"]'
      # Set these in DO console (encrypted) — never commit:
      # SECRET_KEY, DATABASE_URL, REDIS_URL, REDIS_RESULT_BACKEND
      # MONGODB_URL, CELERY_BROKER_URL, CELERY_RESULT_BACKEND
      # SPACES_KEY, SPACES_SECRET, SENTRY_DSN, SLACK_WEBHOOK_URL

  # ── Celery Worker ────────────────────────────────────────────────────────
  - name: worker
    source_dir: backend
    github:
      repo: shaheersinn/BD-law-AI
      branch: main
      deploy_on_push: true
    dockerfile_path: Dockerfile
    # professional-xs: 2 vCPU / 2 GB RAM — required for in-process ML scoring
    instance_size_slug: professional-xs
    instance_count: 1
    min_instance_count: 1
    run_command: >
      celery -A app.tasks.celery_app:celery_app worker
      --loglevel=info
      --concurrency=4
      --queues=scrapers,features,scoring,agents,default
      --max-tasks-per-child=1000
    envs:
      - key: ENVIRONMENT
        value: production
      - key: LIVE_FEEDS_ENABLED
        value: "true"

  # ── Celery Beat Scheduler ────────────────────────────────────────────────
  - name: beat
    source_dir: backend
    github:
      repo: shaheersinn/BD-law-AI
      branch: main
      deploy_on_push: true
    dockerfile_path: Dockerfile
    instance_size_slug: basic-xxs
    instance_count: 1
    run_command: >
      celery -A app.tasks.celery_app:celery_app beat
      --loglevel=info
      --scheduler redbeat.RedBeatScheduler

    envs:
      - key: ENVIRONMENT
        value: production

# ── React Frontend (Static Site) ──────────────────────────────────────────
static_sites:
  - name: frontend
    source_dir: frontend
    github:
      repo: shaheersinn/BD-law-AI
      branch: main
      deploy_on_push: true
    build_command: npm install && npm run build
    output_dir: dist
    index_document: index.html
    error_document: index.html
    routes:
      - path: /
    envs:
      # This will be auto-populated with the api service's public URL
      - key: VITE_API_URL
        value: ${api.PUBLIC_URL}
