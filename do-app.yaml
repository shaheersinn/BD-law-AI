# ORACLE — DigitalOcean App Platform deployment spec
# Region: tor1 (Toronto — Canadian data residency)
# Replace REPLACE_GITHUB_USERNAME before deploying.
# Set encrypted env vars in the DO console, never commit secrets.

name: oracle-bd-for-law
region: tor1

services:
  - name: api
    source_dir: /
    github:
      repo: REPLACE_GITHUB_USERNAME/oracle-bd
      branch: main
      deploy_on_push: true
    dockerfile_path: backend/Dockerfile
    instance_size_slug: basic-s
    instance_count: 1
    min_instance_count: 1
    http_port: 8000
    # Migrations are NEVER run automatically at startup.
    # Run scripts/run_migrations.sh manually before each deploy that includes schema changes.
    run_command: >
      sh -c "cd backend &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2"
    health_check:
      http_path: /api/health
      initial_delay_seconds: 40
      period_seconds: 30
      failure_threshold: 3
    envs:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: ALLOWED_ORIGINS
        value: '["https://oracle-bd-for-law.ondigitalocean.app"]'
      - key: LIVE_FEEDS_ENABLED
        value: "true"
      # Set these in DO console (encrypted):
      # SECRET_KEY, DATABASE_URL, REDIS_URL, MONGODB_URL
      # GROQ_API_KEY (training only — never production scoring)
      # SPACES_KEY, SPACES_SECRET, SENTRY_DSN, SLACK_WEBHOOK_URL

  - name: worker
    source_dir: /
    github:
      repo: REPLACE_GITHUB_USERNAME/oracle-bd
      branch: main
      deploy_on_push: true
    dockerfile_path: backend/Dockerfile
    # professional-xs: 2 vCPU / 2 GB RAM — required for in-process ML scoring
    instance_size_slug: professional-xs
    instance_count: 1
    min_instance_count: 1
    run_command: >
      sh -c "cd backend &&
      celery -A app.tasks.celery_app:celery_app worker
      --loglevel=info --concurrency=4
      --queues=scrapers,features,scoring,agents,default"
    envs:
      - key: ENVIRONMENT
        value: production
      - key: LIVE_FEEDS_ENABLED
        value: "true"

  - name: beat
    source_dir: /
    github:
      repo: REPLACE_GITHUB_USERNAME/oracle-bd
      branch: main
      deploy_on_push: true
    dockerfile_path: backend/Dockerfile
    instance_size_slug: basic-xxs
    instance_count: 1
    run_command: >
      sh -c "cd backend &&
      celery -A app.tasks.celery_app:celery_app beat
      --loglevel=info --scheduler redbeat.RedBeatScheduler"
    envs:
      - key: ENVIRONMENT
        value: production

static_sites:
  - name: frontend
    source_dir: frontend
    github:
      repo: REPLACE_GITHUB_USERNAME/oracle-bd
      branch: main
      deploy_on_push: true
    build_command: npm install && npm run build
    output_dir: dist
    index_document: index.html
    error_document: index.html
    routes:
      - path: /
    envs:
      - key: VITE_API_URL
        value: ${api.PUBLIC_URL}
